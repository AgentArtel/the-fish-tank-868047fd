<script type="text/babel" data-presets="env,react">
  function App() {
    const [route, setRoute] = React.useState("home");
    const [product, setProduct] = React.useState(null);
    const [cart, setCart] = React.useState([]);
    const [cartOpen, setCartOpen] = React.useState(false);

    const go = (r, p) => {
      if (p) setProduct(p);
      setRoute(r);
      window.scrollTo({ top: 0 });
    };
    const addToCart = (p) => {
      setCart((c) => {
        const ex = c.find((it) => it.id === p.id);
        if (ex) return c.map((it) => it.id === p.id ? { ...it, qty: it.qty + 1 } : it);
        return [...c, { id: p.id, name: p.name, vendor: p.vendor, price: p.price, img: p.img, qty: 1 }];
      });
      setCartOpen(true);
    };
    const changeQty = (id, d) => setCart((c) => c.map((it) => it.id === id ? { ...it, qty: Math.max(1, it.qty + d) } : it));
    const removeItem = (id) => setCart((c) => c.filter((it) => it.id !== id));
    const cartCount = cart.reduce((s, it) => s + it.qty, 0);

    React.useLayoutEffect(() => { window.lucide && window.lucide.createIcons(); });

    return (
      <div>
        <window.SiteHeader route={route} go={go} cartCount={cartCount} onCart={() => setCartOpen(true)} />
        {route === "home" && <window.Home go={go} addToCart={addToCart} />}
        {route === "catalog" && <window.Catalog go={go} addToCart={addToCart} />}
        {route === "product" && <window.Product go={go} product={product} addToCart={addToCart} />}
        <window.SiteFooter go={go} />
        <window.CartDrawer open={cartOpen} items={cart} onClose={() => setCartOpen(false)} onQty={changeQty} onRemove={removeItem} go={go} />
      </div>
    );
  }
  function mount() {
    if (!window.TheFishTankDesignSystem_a2acac || !window.Home || !window.CartDrawer) { return setTimeout(mount, 30); }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
  mount();
</script>
</body>
