<!-- @dsCard group="Type" viewport="700x190" name="Mono & Script" subtitle="JetBrains Mono for codes · Pacifico for flourish" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 32px; background: var(--surface-page); display: flex; gap: 40px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .spec { font: var(--text-2xs)/1 var(--font-mono); color: var(--text-muted); }
  .mono { font: var(--fw-medium) var(--text-base)/1.5 var(--font-mono); color: var(--text-body); }
  .mono .muted { color: var(--text-muted); }
  .script { font: 40px/1 var(--font-script); color: var(--brand-primary); }
  .script-note { font: var(--type-caption); color: var(--text-muted); max-width: 220px; }
</style>
</head>
<body>
  <div class="col">
    <div class="spec">mono — SKUs, tank & plug codes</div>
    <div class="mono">C-40100 <span class="muted">·</span> SKU-8842</div>
    <div class="mono">$129.00 <span class="muted">· 2.5"</span></div>
  </div>
  <div class="col">
    <div class="spec">script — Pacifico</div>
    <div class="script">The Fish Tank</div>
    <div class="script-note">Brand wordmark flourish only — never body copy.</div>
  </div>
</body>
</html>
