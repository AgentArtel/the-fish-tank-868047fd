<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals — Sand & Ink" subtitle="Warm cream surfaces through to ink text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--ring-hairline); }
  .chip { height: 64px; }
  .lab { padding: 8px 10px; background: var(--surface-card); }
  .lab .n { font: var(--type-caption); color: var(--text-heading); }
  .lab .v { font: var(--fw-medium) var(--text-2xs)/1.3 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sand-50)"></div><div class="lab"><div class="n">Sand 50 ◆</div><div class="v">--surface-page</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-100)"></div><div class="lab"><div class="n">Sand 100</div><div class="v">--surface-sunken</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-200)"></div><div class="lab"><div class="n">Sand 200</div><div class="v">--border-default</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="lab"><div class="n">Ink 400</div><div class="v">--text-muted</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="lab"><div class="n">Ink 600</div><div class="v">--text-secondary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="lab"><div class="n">Ink 950 ◆</div><div class="v">--text-heading</div></div></div>
  </div>
</body>
</html>
