<!-- @dsCard group="Colors" viewport="700x190" name="Tints & Deep Ocean" subtitle="Blue/cyan tints + abyss navy darks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--ring-hairline); }
  .chip { height: 64px; }
  .lab { padding: 8px 10px; background: var(--surface-card); }
  .lab .n { font: var(--type-caption); color: var(--text-heading); }
  .lab .v { font: var(--fw-medium) var(--text-2xs)/1.3 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="lab"><div class="n">Blue 100</div><div class="v">--blue-100</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-200)"></div><div class="lab"><div class="n">Cyan 200</div><div class="v">--cyan-200</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--royal-900)"></div><div class="lab"><div class="n">Royal 900</div><div class="v">--royal-900</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--abyss-800)"></div><div class="lab"><div class="n">Abyss 800</div><div class="v">--abyss-800</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--abyss-900)"></div><div class="lab"><div class="n">Abyss 900 ◆</div><div class="v">--surface-ocean</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--abyss-950)"></div><div class="lab"><div class="n">Abyss 950</div><div class="v">--abyss-950</div></div></div>
  </div>
</body>
</html>
