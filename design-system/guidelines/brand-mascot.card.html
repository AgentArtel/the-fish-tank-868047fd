<!-- @dsCard group="Brand" viewport="700x300" name="Brand Art & Wave" subtitle="Blue tang, wave, and coral composition on deep ocean" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--grad-ocean); display: flex; gap: 20px;
         align-items: center; }
  .tile { background: var(--abyss-950); border: 1px solid var(--border-ocean);
          border-radius: var(--radius-lg); padding: 14px; display: flex; flex-direction: column;
          align-items: center; gap: 8px; }
  .tile img { object-fit: contain; }
  .a img { width: 180px; height: 120px; }
  .b img { width: 180px; height: 120px; }
  .c img { width: 170px; height: 70px; }
  .cap { font: var(--type-caption); color: var(--text-on-ocean-muted); letter-spacing: var(--tracking-wide); }
</style>
</head>
<body>
  <div class="tile a"><img src="../assets/logo-fish.png" alt="Blue tang mark" /><span class="cap">Tang mark</span></div>
  <div class="tile b"><img src="../assets/fish-coral-wave.png" alt="Tang with coral and wave" /><span class="cap">Coral composition</span></div>
  <div class="tile c"><img src="../assets/wave-dark.png" alt="Wave motif" /><span class="cap">Wave motif</span></div>
</body>
</html>
