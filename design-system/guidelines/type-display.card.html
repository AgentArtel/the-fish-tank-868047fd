<!-- @dsCard group="Type" viewport="700x300" name="Display — Bricolage Grotesque" subtitle="Hero & headings; tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 32px; background: var(--surface-page); display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font: var(--text-2xs)/1 var(--font-mono); color: var(--text-muted); white-space: nowrap; width: 96px; flex: none; }
  .hero { font: var(--type-display); letter-spacing: var(--tracking-tight); color: var(--text-heading); }
  .h1 { font: var(--type-h1); letter-spacing: var(--tracking-snug); color: var(--text-heading); }
  .h2 { font: var(--type-h2); color: var(--text-heading); }
  .h3 { font: var(--type-h3); color: var(--text-heading); }
</style>
</head>
<body>
  <div class="line"><span class="spec">display 48</span><span class="hero">Reef-ready</span></div>
  <div class="line"><span class="spec">h1 / 36</span><span class="h1">Saltwater fish & coral</span></div>
  <div class="line"><span class="spec">h2 / 28</span><span class="h2">New arrivals this week</span></div>
  <div class="line"><span class="spec">h3 / 22</span><span class="h3">Tank-raised clownfish pairs</span></div>
</body>
</html>
