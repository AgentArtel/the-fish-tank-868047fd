<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 32px; background: var(--surface-page); display: flex; gap: 14px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--blue-300); border-radius: var(--radius-xs); width: 100%; }
  .n { font: var(--type-2xs); color: var(--text-heading); font-weight: var(--fw-semibold); }
  .v { font: var(--text-2xs)/1 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="item"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="v">8</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="v">12</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="v">16</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="v">24</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="v">32</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="n">12</div><div class="v">48</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="n">16</div><div class="v">64</div></div>
  <div class="item"><div class="bar" style="height:80px"></div><div class="n">20</div><div class="v">80</div></div>
</body>
</html>
